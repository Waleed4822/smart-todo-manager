<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Todo Manager</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="themeToggle" class="theme-toggle" title="Toggle theme">🌙</button>

  <div class="app">
    <header class="app-header">
      <h1>✅ Smart Todo Manager</h1>
      <p class="subtitle">Stay organized, stay ahead</p>
    </header>

    <!-- Dashboard -->
    <section class="dashboard">
      <div class="stat-card">
        <span class="stat-value" id="statTotal">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-card completed">
        <span class="stat-value" id="statCompleted">0</span>
        <span class="stat-label">Completed</span>
      </div>
      <div class="stat-card pending">
        <span class="stat-value" id="statPending">0</span>
        <span class="stat-label">Pending</span>
      </div>
      <div class="stat-card overdue">
        <span class="stat-value" id="statOverdue">0</span>
        <span class="stat-label">Overdue</span>
      </div>
    </section>

    <!-- Task Form -->
    <section class="card form-card">
      <form id="taskForm">
        <input type="hidden" id="taskId">
        <div class="form-row">
          <input type="text" id="taskTitle" placeholder="What needs to be done?" required maxlength="120">
        </div>
        <div class="form-row form-row-grid">
          <input type="date" id="taskDate">
          <input type="time" id="taskTime">
          <select id="taskPriority">
            <option value="low">Low Priority</option>
            <option value="medium" selected>Medium Priority</option>
            <option value="high">High Priority</option>
          </select>
          <button type="submit" class="btn-primary" id="submitBtn">Add Task</button>
        </div>
      </form>
    </section>

    <!-- Controls -->
    <section class="controls">
      <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search tasks...">
      <div class="filters" id="filterButtons">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
        <button class="filter-btn" data-filter="overdue">Overdue</button>
      </div>
    </section>

    <!-- Task List -->
    <section class="card">
      <ul id="taskList" class="task-list"></ul>
      <div id="emptyState" class="empty-state" hidden>
        <p>🗂️ No tasks found</p>
      </div>
    </section>

    <footer class="app-footer">
      Created by Engr. Waleed Ahmad
    </footer>
  </div>

<script src="storage.js"></script>
<script src="app.js"></script>
</body>
</html>
